<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
  <link rel="stylesheet" href="{{ '/assets/css/landing.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  <link rel="stylesheet" href="{{ '/assets/css/footer.css' | relative_url }}?v={{ site.time | date: '%s' }}">
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a class="brand" href="/">
        <span class="brand-mark"><img src="{{ '/assets/defiscoring-logo-white-100x100.png' | relative_url }}" alt="DeFi Scoring logo" width="32" height="32"></span>
        <span class="brand-text">DeFi Scoring</span>
      </a>
      <nav class="nav-links">
        <a class="nav-link" href="/pricing/" style="margin-right:18px;color:var(--ds-text);text-decoration:none;font-weight:600;font-size:14px">Pricing</a>
        <a class="btn btn-primary" href="/dashboard/">Open Dashboard</a>
      </nav>
    </div>
  </header>
  <main id="main" class="container" style="padding:80px 24px">
    {{ content }}
  </main>
  {% include site-footer.html %}
  {% include dashboard/intel-consent.html %}
  <script>window.DEFI_RISK_WORKER_URL = window.DEFI_RISK_WORKER_URL || "{{ site.defi.worker_url | default: 'https://defiscoring.guillaumelauzier.workers.dev' }}";</script>
</body>
</html>
