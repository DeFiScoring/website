# DeFiScoring – protocol catalog (source of truth)
#
# Real, verifiable smart-contract addresses for major DeFi protocols across
# Ethereum (1), Arbitrum (42161), and Polygon (137). Used by:
#   - the Worker exposure endpoint to map a user's contract interactions
#     to a known protocol slug,
#   - the protocol scoring endpoint to look up DeFiLlama slugs.
#
# This file is published as JSON at /assets/data/protocols.json by Jekyll
# (see assets/data/protocols.json file). The Worker fetches that URL on
# cold start and caches it in KV for 1h.
#
# Schema:
#   - slug:       DeFiLlama slug (https://defillama.com/protocol/<slug>)
#     name:       Display name
#     category:   lending | dex | liquid_staking | yield | derivatives | stablecoin
#     contracts:  list of { chain_id, address, label }
#
# Adding a protocol: append below, push, redeploy. Address case is normalized.

