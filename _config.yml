# DeFi Scoring – Jekyll site configuration
#
# This site has been stripped down from the original Snowlake theme to keep the
# codebase focused on the DeFi Scoring app surface (landing page, dashboard,
# audit directory). E-commerce, agency, blog, and portfolio scaffolding has
# been removed. Only the layouts and includes still under `_layouts/` and
# `_includes/` are part of the active build.

baseurl: ""
url: "https://defiscoring.com"

# Brand.
title: "DeFi Scoring"
tagline: "Your on-chain credit score. Instant. Verifiable. Actionable."
description: "DeFiScore gives any wallet an on-chain credit score (300–850), portfolio risk heatmaps, real-time alerts, and a free public API across Ethereum, Arbitrum, and Polygon. Instant. Verifiable. Actionable."
keywords: "on-chain credit score, DeFi credit score, wallet credit score, DeFi FICO, DeFi lending risk, portfolio risk heatmap, on-chain FICO, Aave risk, Compound risk, DeFi underwriting, DeFiScore"
lang: en_US

# Canonical social image used by Open Graph + Twitter cards when a page does
# not set its own `image:` in front-matter. 1200×630 recommended — the current
# asset is the 500×500 brand mark and works as a safe default. Replace with a
# proper /assets/og-image.png (1200×630) when the marketing art is ready.
social_image: "/assets/defiscoring-logo-white-2_1776667771148.png"

# Social handle used by `twitter:site` + `twitter:creator` meta tags.
twitter_username: "DeFiScoring"

# Organization/brand fields consumed by _includes/head.html for JSON-LD.
organization:
  name: "DeFi Scoring"
  alternate_name: "DeFiScore"
  logo: "/assets/defiscoring-logo-white-2_1776667771148.png"

# DeFi Scoring runtime configuration. Override per-environment if needed.
defi:
  worker_url: "https://defiscoring.guillaumelauzier.workers.dev"
  # Optional Cloudflare Web3 Gateway URLs (Cloudflare dashboard → Web3 →
  # Create Gateway). Leaving these blank keeps the public free-tier RPCs.
  rpc:
    ethereum: ""
    arbitrum: ""
    polygon: ""

# Build settings
plugins:
  - jekyll-feed

# Active collections. The bulk of DeFi Scoring content is plain pages under
# `dashboard/` and `audits/`. The `audits` collection is the only custom
# collection we ship.
collections:
  audits:
    output: true
    permalink: /audits/:path/

defaults:
  - scope: { path: "", type: "audits" }
    values: { layout: "audit" }
  # Dashboard pages are app surfaces — keep them out of the search index.
  - scope: { path: "dashboard" }
    values: { noindex: true }

# Files / folders Jekyll should ignore during build.
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - worker
  - workers
  - migrations
  - scripts
  - wrangler.jsonc
  - cloudflare.toml
  - netlify.toml
  - github.toml
  - replit.md
  - attached_assets
  - .github
  - .wrangler
  - .wranglerignore
  - .ruby-version
  - .replit
  - .config
  - .agents
  - .local
  - .DS_Store
  - .cache
  - .jekyll-cache
