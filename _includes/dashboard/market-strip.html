<div class="defi-market-strip" id="defi-market-strip" data-collapsed="true">
  <button type="button" class="defi-market-strip__toggle" data-defi-market-toggle aria-expanded="false" aria-controls="defi-market-strip-body">
    <i data-lucide="activity" aria-hidden="true"></i>
    <span class="defi-market-strip__toggle-label">Live Market</span>
    <i class="defi-market-strip__chevron" data-lucide="chevron-up" aria-hidden="true"></i>
  </button>
  <div class="defi-market-strip__body" id="defi-market-strip-body" data-defi-market-body>
    <div class="defi-market-strip__items">
      <span class="defi-market-strip__item" data-defi-market-key="btc">
        <span class="defi-market-strip__label">BTC</span>
        <span class="defi-market-strip__value">—</span>
      </span>
      <span class="defi-market-strip__item" data-defi-market-key="eth">
        <span class="defi-market-strip__label">ETH</span>
        <span class="defi-market-strip__value">—</span>
      </span>
      <span class="defi-market-strip__item" data-defi-market-key="defi-tvl">
        <span class="defi-market-strip__label">DeFi TVL</span>
        <span class="defi-market-strip__value">—</span>
      </span>
      <span class="defi-market-strip__item" data-defi-market-key="rwa-tvl">
        <span class="defi-market-strip__label">RWA TVL</span>
        <span class="defi-market-strip__value">—</span>
      </span>
    </div>
    <span class="defi-market-strip__updated" data-defi-market-updated>Updating…</span>
  </div>
</div>
